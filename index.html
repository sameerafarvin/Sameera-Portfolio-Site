<!-- d-flex flex-column: stacks header, main, and footer vertically -->
<!-- min-vh-100: ensures body takes up at least the full screen height -->
<!-- Combined with flex-grow-1 on main, this keeps the footer at the bottom -->

		<h1>Sameera</h1>
	</header>

	<!-- flex-grow-1: makes main expand to fill all available vertical space -->
	<!-- This pushes the footer down to the bottom of the page -->
	<main class="flex-grow-1">
		<section id="home" class="hero">
			
		</section>

		<section id="about" class="about">
			
		</section>

		<section id="skills" class="skills">
			
		</section>

		<section id="projects" class="projects">
			<div class="container">
				<h2></h2>

				<div class="project-grid">
					<article class="project-card">
						
					</article>

					<article class="project-card">
						
					</article>

					<article class="project-card">
						
					</article>
				</div>
			</div>
		</section>

		<section id="contact" class="contact">
			
		</section>
	</main>

	<footer class=" site-footer">
		<div class="container">
			<p>&copy; 2026 Sameera. All rights reserved.</p>
		</div>
	</footer>
